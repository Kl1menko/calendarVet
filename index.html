<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>CalendarVet</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>

    <!-- LOADING SPLASH -->
    <div class="splash" id="splash" hidden>
      <div class="splash-logo">UV</div>
    </div>

    <!-- LOGIN SCREEN -->
    <div class="login-screen" id="loginScreen" hidden>
      <div class="login-card">
        <div class="login-logo">UV</div>
        <h1 class="login-title">UltraVet</h1>
        <p class="login-sub">Ветеринарна клініка</p>
        <form id="loginForm">
          <label>Email
            <input name="email" type="email" placeholder="doctor@clinic.com" autocomplete="email" required />
          </label>
          <label>Пароль
            <input name="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
          </label>
          <div id="loginError" class="login-error" hidden></div>
          <button class="button save login-btn" type="submit" id="loginBtn">Увійти</button>
        </form>
      </div>
    </div>

    <!-- MAIN APP -->
    <div class="app-shell" id="appShell" hidden>
      <aside class="desktop-rail" aria-label="Основна навігація">
        <div class="brand-mark">UltraVet</div>
        <button class="desk-new-btn" id="deskNewBtn" type="button">Новий запис</button>
        <nav>
          <button class="active" type="button" data-tab="calendar">Календар</button>
          <button type="button" data-tab="clients">Клієнти</button>
          <button type="button" data-tab="alerts">Сповіщення</button>
        </nav>
        <div class="rail-user" id="railUser"></div>
        <button class="rail-logout" id="logoutBtn" type="button">Вийти</button>
      </aside>

      <main class="screen" id="calendar">
        <header class="topbar">
          <div>
            <p class="eyebrow">UltraVet</p>
            <h1 id="dayTitle">Сьогодні</h1>
          </div>
          <div class="topbar-actions">
            <button class="icon-button mobile-only" id="mobileLogoutBtn" aria-label="Вийти">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            </button>
          </div>
        </header>

        <section class="clinic-pulse calendar-only" aria-label="Стан дня">
          <article>
            <span id="todayTotal">0</span>
            <p>записів сьогодні</p>
          </article>
          <article>
            <span id="nextVisit">--:--</span>
            <p>найближчий прийом</p>
          </article>
        </section>

        <section class="day-controls calendar-only" aria-label="Керування календарем">
          <button class="chip" id="prevDay" aria-label="Попередній день">‹</button>
          <button class="chip primary" id="todayButton">Сьогодні</button>
          <button class="chip" id="nextDay" aria-label="Наступний день">›</button>
          <button class="chip filter doctor-filter" id="doctorFilter" type="button">
            <span class="filter-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2M9.5 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </span>
            <span class="filter-copy">
              <span class="filter-label">Лікар</span>
              <span class="filter-value" id="doctorFilterValue">Всі лікарі</span>
            </span>
            <span class="filter-chevron" aria-hidden="true">
              <svg viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg>
            </span>
          </button>
        </section>

        <section class="view-switcher calendar-only" aria-label="Режим календаря">
          <button class="active" data-view="day">День</button>
          <button data-view="week">Тиждень</button>
        </section>

        <!-- DAY TIMELINE VIEW -->
        <section class="timeline-panel calendar-only" id="timelinePanel" aria-live="polite">
          <div class="schedule-heading">
            <h2 id="scheduleDate">Сьогодні</h2>
            <span id="appointmentCount">0 записів</span>
          </div>
          <div class="timeline-wrap" id="timelineWrap">
            <div class="timeline-grid" id="timelineGrid"></div>
          </div>
        </section>

        <!-- WEEK LIST VIEW -->
        <section class="schedule-panel calendar-only" id="weekPanel" hidden aria-live="polite">
          <div class="schedule-heading">
            <h2 id="weekDate"></h2>
            <span id="weekCount"></span>
          </div>
          <div class="appointment-list" id="weekList"></div>
        </section>

        <section class="utility-page" id="utilityPage" hidden></section>
      </main>

      <button class="fab" id="newAppointment" aria-label="Новий запис">+</button>

      <nav class="bottom-nav" aria-label="Мобільна навігація">
        <button class="active" type="button" data-tab="calendar" aria-label="Календар">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 2v4M16 2v4M4 9h16M5 5h14a1 1 0 0 1 1 1v14a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1Z"/></svg>
          Календар
        </button>
        <button type="button" data-tab="clients" aria-label="Клієнти">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2M9.5 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8ZM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Клієнти
        </button>
        <button type="button" data-tab="alerts" aria-label="Сповіщення">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 1 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9ZM13.73 21a2 2 0 0 1-3.46 0"/></svg>
          Сповіщення
        </button>
      </nav>
    </div>

    <div class="overlay" id="overlay" hidden></div>

    <!-- DETAILS SHEET -->
    <section class="sheet" id="detailsSheet" aria-modal="true" role="dialog" aria-labelledby="detailsTitle" hidden>
      <div class="sheet-handle"></div>
      <div id="detailsContent"></div>
    </section>

    <!-- FORM SHEET -->
    <section class="sheet tall" id="formSheet" aria-modal="true" role="dialog" aria-labelledby="formTitle" hidden>
      <div class="sheet-handle"></div>
      <form id="appointmentForm">
        <h2 id="formTitle">Новий запис</h2>
        <label>Дата <input name="date" type="date" required /></label>
        <label>Час початку <input name="start" type="time" required /></label>
        <label>
          Тривалість
          <select name="duration" required>
            <option value="15">15 хв</option>
            <option value="30" selected>30 хв</option>
            <option value="45">45 хв</option>
            <option value="60">1 година</option>
            <option value="90">1 год 30 хв</option>
            <option value="120">2 години</option>
          </select>
        </label>
        <label>Клієнт <input name="client" type="text" placeholder="Олена" required /></label>
        <label>Телефон <input name="phone" type="tel" placeholder="+380671112233" required /></label>
        <label>Тварина <input name="pet" type="text" placeholder="Рекс" required /></label>
        <label>Вид/порода <input name="animal" type="text" placeholder="собака, лабрадор" /></label>
        <label>Послуга <input name="service" type="text" placeholder="Вакцинація" required /></label>
        <label>
          Відповідальний лікар
          <select name="doctor" required></select>
        </label>
        <label>
          Статус
          <select name="status" required>
            <option>Заплановано</option>
            <option>Очікує</option>
            <option>В кабінеті</option>
            <option>Завершено</option>
          </select>
        </label>
        <label>Коментар <textarea name="comment" rows="3" placeholder="Коротка примітка"></textarea></label>
        <div class="sticky-actions">
          <button class="button ghost" type="button" data-close>Закрити</button>
          <button class="button save" type="submit" id="formSaveBtn">Зберегти</button>
        </div>
      </form>
    </section>

    <!-- SEARCH SHEET -->
    <section class="sheet tall" id="searchSheet" aria-modal="true" role="dialog" aria-labelledby="searchTitle" hidden>
      <div class="sheet-handle"></div>
      <h2 id="searchTitle">Пошук</h2>
      <input class="search-input" id="searchInput" type="search" placeholder="Клієнт, телефон, тварина, послуга, лікар" />
      <div class="appointment-list compact" id="searchResults"></div>
    </section>

    <!-- DOCTOR FILTER SHEET -->
    <section class="sheet" id="doctorSheet" aria-modal="true" role="dialog" aria-labelledby="doctorTitle" hidden>
      <div class="sheet-handle"></div>
      <h2 id="doctorTitle">Фільтр по лікарю</h2>
      <div class="doctor-options" id="doctorOptions"></div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
